# render.yaml — Deploy Begin's Express backend to Render (free tier)
# Docs: https://render.com/docs/blueprint-spec
#
# DATABASE NOTE:
# SQLite requires a persistent disk, which Render's free tier doesn't support.
# We use a free PostgreSQL database from Neon (https://neon.tech) instead.
# Set DATABASE_URL manually in the Render dashboard after deploying.

services:
  - type: web
    name: begin-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # ⚠️ Set these manually in the Render dashboard → Environment:
      # DATABASE_URL  — your Neon PostgreSQL connection string
      # JWT_ACCESS_SECRET   — a long random string (32+ chars)
      # JWT_REFRESH_SECRET  — a different long random string
      # CLIENT_ORIGIN       — your Vercel URL, e.g. https://begin-xyz.vercel.app
